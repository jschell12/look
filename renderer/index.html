<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>xmuggle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>xmuggle</h1>
    <span id="count"></span>
    <div id="settings-area" style="margin-left:auto; display:flex; gap:12px; align-items:center;">
      <select id="relay-select" title="Relay to"></select>
      <span id="relay-status" style="font-size:11px;"></span>
      <div id="daemon-indicator" class="daemon-indicator" title="Daemon: checking...">
        <span class="daemon-dot"></span>
        <span class="daemon-label">Daemon</span>
      </div>
      <button id="settings-btn" class="settings-btn" title="Settings">&#9881;</button>
    </div>
  </header>
  <div id="projects-bar">
    <div id="project-tabs"></div>
    <button id="add-project" class="add-project-btn" title="Add project">+</button>
    <button id="add-note" class="add-note-btn" title="Paste text note">+ Text</button>
  </div>
  <div id="grid"></div>
  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
